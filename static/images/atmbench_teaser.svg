<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img"
  aria-label="ATM-Bench overview diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f6f8ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10" />
    </filter>
    <style>
      .title { font: 700 42px "Google Sans", "Noto Sans", system-ui, -apple-system, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px "Google Sans", "Noto Sans", system-ui, -apple-system, sans-serif; fill: #334155; }
      .label { font: 700 18px "Google Sans", "Noto Sans", system-ui, -apple-system, sans-serif; fill: #0f172a; }
      .text { font: 500 16px "Google Sans", "Noto Sans", system-ui, -apple-system, sans-serif; fill: #334155; }
      .tiny { font: 500 14px "Google Sans", "Noto Sans", system-ui, -apple-system, sans-serif; fill: #475569; }
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 2; rx: 18; }
      .chip { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1.5; rx: 12; }
      .chipText { font: 600 14px "Google Sans", "Noto Sans", system-ui, -apple-system, sans-serif; fill: #3730a3; }
      .arrow { stroke: #475569; stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.9; }
      .accent { fill: #2563eb; }
      .accent2 { fill: #22c55e; }
      .accent3 { fill: #f59e0b; }
      .accent4 { fill: #a855f7; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10"
      orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)" />

  <text x="70" y="92" class="title">ATM-Bench</text>
  <text x="70" y="128" class="subtitle">Long-term personalized referential memory QA • multimodal • multi-source • evidence-grounded</text>

  <!-- Cards -->
  <g filter="url(#shadow)">
    <rect x="70" y="175" width="270" height="320" class="card" />
    <rect x="370" y="175" width="270" height="320" class="card" />
    <rect x="670" y="175" width="270" height="320" class="card" />
    <rect x="970" y="175" width="160" height="320" class="card" />
  </g>

  <!-- Card headers -->
  <text x="100" y="220" class="label">Memory sources</text>
  <text x="400" y="220" class="label">Ingestion</text>
  <text x="700" y="220" class="label">Retrieval</text>
  <text x="1000" y="220" class="label">Answer</text>

  <!-- Memory sources bullets -->
  <g>
    <rect x="100" y="245" width="210" height="38" class="chip" />
    <circle cx="120" cy="264" r="10" class="accent" />
    <text x="140" y="270" class="chipText">Images</text>

    <rect x="100" y="292" width="210" height="38" class="chip" />
    <circle cx="120" cy="311" r="10" class="accent2" />
    <text x="140" y="317" class="chipText">Videos</text>

    <rect x="100" y="339" width="210" height="38" class="chip" />
    <circle cx="120" cy="358" r="10" class="accent3" />
    <text x="140" y="364" class="chipText">Emails</text>

    <rect x="100" y="386" width="210" height="38" class="chip" />
    <circle cx="120" cy="405" r="10" class="accent4" />
    <text x="140" y="411" class="chipText">Other artifacts</text>

    <text x="100" y="458" class="tiny">Privacy-preserving, consented, multi-year</text>
    <text x="100" y="480" class="tiny">Ground-truth evidence for evaluation</text>
  </g>

  <!-- Ingestion -->
  <g>
    <text x="400" y="260" class="text">Normalize raw artifacts into</text>
    <text x="400" y="284" class="text">a unified memory store via</text>

    <rect x="400" y="305" width="210" height="56" class="chip" />
    <text x="418" y="338" class="chipText">Schema-Guided Memory (SGM)</text>

    <text x="400" y="395" class="tiny">Cross-source fields • timestamps</text>
    <text x="400" y="417" class="tiny">entities • locations • relations</text>
  </g>

  <!-- Retrieval -->
  <g>
    <text x="700" y="260" class="text">Retrieve a bounded set of</text>
    <text x="700" y="284" class="text">supporting evidence items</text>

    <rect x="700" y="305" width="210" height="56" class="chip" />
    <text x="742" y="338" class="chipText">Evidence budget</text>

    <text x="700" y="395" class="tiny">Multi-evidence reasoning</text>
    <text x="700" y="417" class="tiny">Conflicting evidence handling</text>
  </g>

  <!-- Answer -->
  <g>
    <text x="1000" y="262" class="text">Answer +</text>
    <text x="1000" y="286" class="text">evidence</text>

    <rect x="1000" y="305" width="110" height="56" class="chip" />
    <text x="1018" y="338" class="chipText">Grounded</text>

    <text x="1000" y="395" class="tiny">Citations to memories</text>
    <text x="1000" y="417" class="tiny">Traceable decisions</text>
  </g>

  <!-- Arrows -->
  <path d="M 340 335 C 355 335, 355 335, 370 335" class="arrow" marker-end="url(#arrowHead)" />
  <path d="M 640 335 C 655 335, 655 335, 670 335" class="arrow" marker-end="url(#arrowHead)" />
  <path d="M 940 335 C 955 335, 955 335, 970 335" class="arrow" marker-end="url(#arrowHead)" />

  <!-- Footer note -->
  <text x="70" y="560" class="tiny">Project page skeleton — replace with final figures, authors, arXiv/venue, code and dataset links upon publication.</text>
</svg>
